name: Japanese Anki Pack Buyer Help
description: Ask for public-safe Payhip checkout or delivery support
title: "[BUY] Japanese Anki Pack - "
labels: ["buyer-inquiry"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for buying Japanese Anki Pack.

        Payhip instant checkout: https://payhip.com/b/D0mhb

        Payhip delivers the ZIP automatically. Email sks7178@gmail.com only if checkout or delivery fails.

        Use this public issue only for public-safe support details. Do not post receipt numbers, screenshots, email addresses, or other payment records.

        Refund/support: 14-day refund if the delivered ZIP cannot be opened, the Anki deck cannot be imported into Anki 24.x, or a listed deliverable is missing. Use email for private payment or delivery details.

  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - Japanese Anki Pack - Payhip $29
    validations:
      required: true

  - type: input
    id: payment_id
    attributes:
      label: Public-safe problem summary
      description: Describe the Payhip checkout or delivery problem without posting receipt numbers, screenshots, or payment records. Write "no problem" for a pre-purchase question.
      placeholder: "Checkout did not complete / delivery email did not arrive / deck will not import"
    validations:
      required: true

  - type: input
    id: delivery_email
    attributes:
      label: Private support email sent?
      description: GitHub issues are public. Write "sent" if you emailed support details to sks7178@gmail.com; do not post your email address here.
      placeholder: "sent / not needed"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Anything else
      description: Optional notes, region, or delivery constraints
      placeholder: "Optional"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirm
      options:
        - label: I understand Payhip delivers the ZIP automatically after checkout.
          required: true
        - label: I understand support/refund requests should be sent by email if they include private payment or delivery details.
          required: true
