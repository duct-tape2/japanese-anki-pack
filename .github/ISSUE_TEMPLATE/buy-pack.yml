name: Buy Japanese Anki Pack
description: Send payment confirmation for the Japanese Anki Pack
title: "[BUY] Japanese Anki Pack - "
labels: ["buyer-inquiry"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for buying Japanese Anki Pack.

        PayPal: https://www.paypal.me/sks7178/29

        For the private path, email sks7178@gmail.com with payer name/email prefix, payment time, and delivery email.

        Use this public issue only if you are comfortable posting public-safe confirmation details. Do not post full transaction IDs in a public issue. ZIP delivery is within 5 minutes during JST/KST business hours.

        Refund/support: 14-day refund if the delivered ZIP cannot be opened, the Anki deck cannot be imported into Anki 24.x, or a listed deliverable is missing. Use email for private payment or delivery details.

  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - Japanese Anki Pack - PayPal $29
        - Japanese Anki Pack - Korea KRW 39,000
    validations:
      required: true

  - type: input
    id: payment_id
    attributes:
      label: Public-safe payment confirmation
      description: For PayPal, enter payer name or email prefix plus approximate payment time. For Korean bank/Toss/KakaoPay, enter depositor name and payment time. If you emailed privately, write "email sent" plus payment time. Do not post full transaction IDs.
      placeholder: "PayPal payer name/email prefix + time / email sent + time / 입금자명 + 입금시각"
    validations:
      required: true

  - type: input
    id: delivery_email
    attributes:
      label: Delivery contact
      description: GitHub issues are public. Enter an email you are comfortable posting publicly, or write "sent by email" if you emailed delivery details to sks7178@gmail.com.
      placeholder: "you@example.com / sent by email"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Anything else
      description: Optional notes, region, or delivery constraints
      placeholder: "Optional"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirm
      options:
        - label: I understand the pack is delivered manually after payment confirmation within 5 min during JST/KST business hours.
          required: true
        - label: I understand support/refund requests should be sent by email if they include private payment or delivery details.
          required: true
